name: Continuous Delivery

on:
  workflow_dispatch
  # To enable automatic deployment on merge to main, uncomment the lines below:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'agents/luncher_agent/**'

jobs:
  build-and-deploy:
    name: Build & Deploy via Terraform
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_LOCATION: ${{ vars.GCP_LOCATION }}
      GCP_WI_PROVIDER_ID: ${{ vars.GCP_WI_PROVIDER_ID }}
      GCP_SA_GITHUB_ACTIONS: ${{ vars.GCP_SA_GITHUB_ACTIONS }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud Project
        uses: 'google-github-actions/auth@v2'
        with:
          service_account: ${{ env.GCP_SA_GITHUB_ACTIONS }}@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com
          workload_identity_provider: ${{ env.GCP_WI_PROVIDER_ID }}

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          version: '>= 363.0.0'

      - name: Get short SHA
        id: slug
        run: echo "sha7=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Submit Cloud Build
        run: |
          gcloud builds submit "./agents/luncher_agent" \
            --config ./agents/luncher_agent/cloudbuild.yaml \
            --region ${{ env.GCP_LOCATION }} \
            --service-account=projects/${{ env.GCP_PROJECT_ID }}/serviceAccounts/${{ env.GCP_SA_GITHUB_ACTIONS }}@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --substitutions _LOCATION=${{ env.GCP_LOCATION }},_IMAGE_TAG=${{ steps.slug.outputs.sha7 }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.3"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=bkt-tf-state-${{ env.GCP_PROJECT_ID }}-${{ github.event.repository.name }}"
        working-directory: terraform

      - name: Terraform Apply (Deploy Service Update)
        run: |
          # Use Terraform to deploy the new container image to Google Cloud Run
          #
          # NOTE ON SECRETS: 
          # Because Cloud Run is managed by Terraform, any Secret Manager integration or secret-mounting is
          # configured directly in 'terraform/main.tf'. The GitHub Action automatically applies those 
          # configurations during this step without needing to pass sensitive keys through GitHub Action secrets!
          terraform apply \
            -auto-approve \
            -var "project_id=${{ env.GCP_PROJECT_ID }}" \
            -var "region=${{ env.GCP_LOCATION }}" \
            -var "image_url=${{ env.GCP_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/luncher-repo/luncher:${{ steps.slug.outputs.sha7 }}"
        working-directory: terraform
