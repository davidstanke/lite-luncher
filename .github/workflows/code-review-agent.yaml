name: Antigravity Code Review Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  code-review:
    name: Run Code Review Agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Trigger Code Review Agent
        run: |
          echo "Triggering Antigravity Code Review Agent on Agent Runtime..."
          
          PAYLOAD=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --arg pr "${{ github.event.pull_request.number }}" \
            --arg token "${{ secrets.GITHUB_TOKEN }}" \
            '{repo_full_name: $repo, pr_number: ($pr | tonumber), github_token: $token}')
            
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "${{ secrets.CODE_REVIEW_AGENT_URL }}/review" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
            
          HTTP_BODY=$(echo "$RESPONSE" | sed -e 's/HTTP_STATUS:.*//g')
          HTTP_STATUS=$(echo "$RESPONSE" | tr -d '\n' | sed -e 's/.*HTTP_STATUS://')

          echo "Response Status: $HTTP_STATUS"
          echo "Response Body: $HTTP_BODY"

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Code Review Agent execution failed with status $HTTP_STATUS"
            exit 1
          fi
